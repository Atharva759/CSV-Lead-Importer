services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      FRONTEND_ORIGIN: http://localhost:3000
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_PROVIDER_FALLBACK: ${AI_PROVIDER_FALLBACK:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-meta/llama-3.3-70b-instruct}
      AI_BATCH_SIZE: ${AI_BATCH_SIZE:-20}
      AI_BATCH_MAX_RETRIES: ${AI_BATCH_MAX_RETRIES:-2}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-5242880}

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend